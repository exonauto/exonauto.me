<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!-- <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"> -->
    <title>ExonAuto</title>
    <meta name="description" content="ExonAuto's personal website.">

    <link href="/css/general.css" rel="stylesheet">
    <link href="/css/blogpage.css" rel="stylesheet">
    <!-- <link href="/css/retro.css" rel="stylesheet"> -->
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  </head>
  
  <body>
    <div id="overlayWrap" class="overlayWrap">
    <iframe id="overlay" style="width:90%; height:90%; border:0;" onclick="event.stopPropagation()"></iframe>
  </div>
  <section id="app">
    <div id="blogList">
      <div style="text-align: center; margin-bottom: 100px;">
        <br>
        <div id="blogs">
        </div>
      </div>
    </div>
    <main>
      <!-- <p> (F8 to preview, F9 to publish) </p> -->
      <div class="options">
        <div>
          title: <input id="title">
        </div>
        <div>
          headline: <input id="headline">
        </div>
        <div>
          url slug: <input id="key">
        </div>
      </div>
      <br>
      <div class="options">
        <div>
          <button style="background-color: lightgreen;" id="post">post current</button>
        </div>
        <div>
          <button style="background-color: yellowgreen;" id="preview">preview current</button>
        </div>
        <div>
          <button style="background-color: darkred; color:#ccc" id="delete">delete current</button>
        </div>
      </div>
      <br>
      <div id="editor" style="border: 1px solid #ccc"></div>
      <br>
    </main>
    <div id="imageList">
      <div style="text-align: center; margin-bottom: 100px;">
        <br>
        <div id="images">
        </div>
      </div>
    </div>
    
    </section>

    <script src="/js/admin.js"></script>
    <script src="/js/header.js"></script>
    <script type="module" src="./blog.js"></script>
  </body>
</html>
